<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Journey Anniversary</title>
    <style th:utext="${styles}">/* styles injected at runtime */</style>
    <style>
        .journey-card {
            border: 1px solid #e4e8f3;
            border-radius: 10px;
            margin: 14px 0;
            overflow: hidden;
            background: #ffffff;
        }

        .journey-hero-image {
            width: 100%;
            max-height: 220px;
            object-fit: cover;
            display: block;
        }

        .journey-body {
            padding: 16px 18px;
        }

        .journey-title {
            margin: 0;
            font-size: 1.05rem;
            color: #1e2a4a;
        }

        .journey-meta {
            margin: 8px 0 10px;
            color: #5a6686;
            font-size: 0.86rem;
        }

        .gallery img {
            width: 72px;
            height: 72px;
            object-fit: cover;
            border-radius: 6px;
            margin-right: 8px;
            margin-bottom: 8px;
            border: 1px solid #dbe1ef;
        }

        .inline-cta {
            margin-top: 8px;
            display: inline-block;
            color: #3459e6;
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div th:replace="~{layout/emailLayout.html :: layout('Journey Anniversary', ~{::content})}">
    <th:block th:ref="content">

        <p class="section-title" th:text="'Happy Journey Anniversary, ' + ${recipientName} + '!'">Happy Journey Anniversary!</p>
        <p>
            On <strong th:text="${anniversaryDate}">12 Jun 2026</strong>, you have
            <strong th:text="${journeyCount}">1</strong>
            memory to revisit.
        </p>

        <th:block th:each="journey : ${journeys}">
            <article class="journey-card">
                <img class="journey-hero-image"
                     th:src="${journey.thumbnailUrl}" th:alt="${journey.journeyTitle}"/>
                <div class="journey-body">
                    <h3 class="journey-title" th:text="${journey.journeyTitle}">Journey Title</h3>
                    <p class="journey-meta"
                       th:text="${journey.journeyDate} + ' | ' + ${journey.geoLocation}">Date | Location</p>

                    <div class="gallery" th:if="${!#lists.isEmpty(journey.imageUrls)}">
                        <p class="text-muted fw-bold">Photo Highlights</p>
                        <img th:each="imageUrl : ${journey.imageUrls}" th:src="${imageUrl}" alt="Journey highlight"/>
                    </div>

                    <a class="inline-cta" th:href="${journey.journeyUrl}">Open Journey</a>
                </div>
            </article>
        </th:block>

    </th:block>
</div>
</body>
</html>
