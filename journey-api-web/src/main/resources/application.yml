spring:
  application:
    name: ${app.name}
    version: ${app.version}
  ai:
    openai:
      api-key: ${GEMINI_API_KEY}
      base-url: https://generativelanguage.googleapis.com/v1beta/openai
      chat:
        completions-path: /chat/completions
        options:
          model: gemini-2.5-flash
          max-completion-tokens: 2048
  data:
    mongodb:
      auto-index-creation: true
  jackson:
    deserialization:
      fail-on-null-for-primitives: false
  mail:
    host:
    port:
    username: ${NOREPLY_EMAIL}
    password: ${NOREPLY_EMAIL_PWD}
    test-connection: true
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true
  mongodb:
    database: journey-dev
    representation:
      uuid: standard
  modulith:
    events:
      completion-mode: delete
      republish-outstanding-events-on-restart: on
      staleness:
        check-intervall: 60s
        published: 5m
        processing: 5m
        resubmitted: 5m
    moments:
      enable-time-machine: true

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  endpoint:
    prometheus:
      access: read_only
  prometheus:
    metrics:
      export:
        enabled: true

app:
  name: Journey API
  version: '@project.version@'
  ui-app-url: https://journey.codewithram.dev
  security:
    webauthn:
      rp-id: journey.codewithram.dev
      rp-name: Journey
      origin: https://journey.codewithram.dev
    totp:
      number-of-digits: 6
      secret-length: 32
      totp-algorithm: SHA1
      time-step-size-in-seconds: 30
      max-allowed-time-step-discrepancy: 1
      qr-type: totp
      qr-width: 500
      qr-height: 500
      qr-issuer: Journey
    cors:
      properties:
        - path: /**
          allowed-origins: https://nramc.github.io, https://journey.codewithram.dev
          allowed-methods: GET, POST, PUT, OPTIONS, DELETE
          allowed-headers:
            - Authorization
            - Content-Type
            - X-Async-Process
          allow-credentials: true

journey:
  module:
    account:
      security:
        ott:
          token-validity: 15m
          recovery-path: /account/recover/login
          tokenQueryPram: token
    infrastructure:
      rate-limit:
        policies:
          login:
            capacity: 5
            window: 15m
          ott-login:
            capacity: 5
            window: 15m
          mfa-verify:
            capacity: 5
            window: 15m
          account-recovery:
            capacity: 3
            window: 1h
          journey-creation:
            capacity: 5
            window: 24h
      event:
        republisher:
          retry-delay: 1m
          min-age: 1m
          least-last-retried: 1m
          batch-size: 100
          max-immediate-retry: 3
    tts:
      base-url: https://piper-tts-service-otp3.onrender.com
      default-voice: en_US-lessac-medium
      default-length-scale: 0.9
      default-noise-scale: 0.7
      default-noise-w-scale: 0.8


jwt:
  private-key: 'file:/etc/secrets/jwt-private.key'
  public-key: 'file:/etc/secrets/jwt-public.pub'
  ttl: 1h
  issuer: self

springdoc:
  api-docs:
    enabled: true
    path: /doc/openapi
    version: openapi_3_0

  swagger-ui:
    queryConfigEnabled: true
    path: /doc/swagger-ui.html
  group-configs:
    - group: Journeys
      packages-to-scan:
        - com.github.nramc.dev.journey.api.journey.web.journeys
        - com.github.nramc.dev.journey.api.journey.web.statistics
    - group: Users
      packages-to-scan:
        - com.github.nramc.dev.journey.api.account.web.users
    - group: Auth
      packages-to-scan:
        - com.github.nramc.dev.journey.api.account.web.auth
    - group: API Info
      packages-to-scan:
        - com.github.nramc.dev.journey.api.account.web.api
    - group: Timeline
      packages-to-scan:
        - com.github.nramc.dev.journey.api.journey.web.timeline
    - group: AI
      packages-to-scan:
        - com.github.nramc.dev.journey.api.ai
    - group: TTS
      packages-to-scan:
        - com.github.nramc.dev.journey.api.tts.web

service:
  cloudinary:
    api-key: ${CLOUDINARY_API_KEY}
    api-secret: ${CLOUDINARY_API_SECRET}
    cloud-name: ${CLOUDINARY_CLOUD_NAME}
    additional-properties:
      secure: true
    root-directory: journey/journey-dev
  telegram:
    enabled: ${TELEGRAM_ENABLED:false}
    bot-token: ${TELEGRAM_BOT_TOKEN:}
    channel-id: ${TELEGRAM_CHANNEL_ID:}
    parse-mode: HTML
    base-url: https://api.telegram.org

server:
  address: 0.0.0.0
  compression:
    enabled: true
    mime-types: application/json,application/geo+json,text/html

logging:
  level:
    root: info
