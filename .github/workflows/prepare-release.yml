# Prepares a new release: bumps the Maven version, creates a Git tag via
# `mvn release:prepare`, then publishes a GitHub Release with auto-generated
# release notes (categorised by PR labels via .github/release.yml).

name: Prepare Release

on:
  # Runs every Sunday at 06:00 UTC for automated weekly releases
  schedule:
    - cron: '0 6 * * 0'
  # Allow manual trigger with an optional version override
  workflow_dispatch:
    inputs:
      releaseVersion:
        description: 'Release Version (leave blank to auto-derive from pom.xml SNAPSHOT)'
        required: false
        default: ''
        type: string

jobs:
  build:

    runs-on: ubuntu-latest

    permissions:
      contents: write   # required to create releases and push the release tag

    steps:

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # full history needed so Maven can inspect tags

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Setup git identity
        run: |
          git config --global user.email "ramachandrannellai@gmail.com"
          git config --global user.name "Deploy Bot"

      - name: Resolve release version
        id: resolve_version
        run: |
          if [ -n "${{ inputs.releaseVersion }}" ]; then
            echo "version=${{ inputs.releaseVersion }}" >> "$GITHUB_OUTPUT"
          else
            # Derive version from pom.xml: strip the -SNAPSHOT suffix
            SNAPSHOT_VERSION=$(./mvnw -q -Dexec.executable=echo -Dexec.args='${project.version}' --non-recursive exec:exec 2>/dev/null)
            RELEASE_VERSION="${SNAPSHOT_VERSION%-SNAPSHOT}"
            echo "version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare Release
        run: ./mvnw -B -DpushChanges=true release:prepare -DscmCommentPrefix='chore:' -DreleaseVersion=$VERSION
        env:
          VERSION: ${{ steps.resolve_version.outputs.version }}

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          commit: main
          tag: v${{ steps.resolve_version.outputs.version }}
          name: v${{ steps.resolve_version.outputs.version }}
          generateReleaseNotes: true
          draft: false
          prerelease: false
          token: ${{ secrets.RELEASE_TOKEN }}
