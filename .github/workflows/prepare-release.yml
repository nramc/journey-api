# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Prepare Release

on:
  # Runs every Sunday at 06:00 UTC for automated weekly releases
  schedule:
    - cron: '0 6 * * 0'
  # Allow manual trigger with an optional version override
  workflow_dispatch:
    inputs:
      releaseVersion:
        description: 'Release Version (leave blank to auto-derive from pom.xml SNAPSHOT)'
        required: false
        default: ''
        type: string
      geminiModel:
        description: 'Gemini model to use (e.g., gemini-3.1-flash-lite-preview, gemini-3-flash-preview, gemini-2.5-flash-lite, gemini-2.5-flash)'
        required: false
        default: 'gemini-2.5-flash-lite'
        type: string

jobs:
  build:

    runs-on: ubuntu-latest

    permissions:
      contents: write   # required to create releases and write RELEASE_NOTES.md
      id-token: write   # required for OIDC token (Gemini CLI auth)

    steps:

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history needed to collect commits since last tag

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: setup git properties for preparation
        run: |
          git config --global user.email "ramachandrannellai@gmail.com"
          git config --global user.name "Deploy Bot"

      - name: Resolve release version
        id: resolve_version
        run: |
          if [ -n "${{ inputs.releaseVersion }}" ]; then
            echo "version=${{ inputs.releaseVersion }}" >> "$GITHUB_OUTPUT"
          else
            # Derive version from pom.xml: strip the -SNAPSHOT suffix
            SNAPSHOT_VERSION=$(mvn -q -Dexec.executable=echo -Dexec.args='${project.version}' --non-recursive exec:exec 2>/dev/null)
            RELEASE_VERSION="${SNAPSHOT_VERSION%-SNAPSHOT}"
            echo "version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate Changelog
        id: changelog
        uses: TriPSs/conventional-changelog-action@v6
        with:
          github-token: ${{ secrets.RELEASE_TOKEN }}
          skip-on-empty: 'false'
          skip-tag: 'true'          # Maven handles tag creation
          skip-commit: 'true'       # do not commit changelog
          git-push: 'false'         # do not push
          output-file: 'true'      # we only need the output variables, not a file

      - name: Prepare Release
        run: mvn -B -DpushChanges=true release:prepare -DscmCommentPrefix='chore:' -DreleaseVersion=$VERSION
        env:
          VERSION: ${{ steps.resolve_version.outputs.version }}

      - name: Get previous tag
        id: get_prev_tag
        run: |
          git fetch --tags
          CURRENT_TAG="v${{ steps.resolve_version.outputs.version }}"
          PREV_TAG=$(git describe --tags --abbrev=0 "${CURRENT_TAG}^" 2>/dev/null || echo "")
          echo "tag=${PREV_TAG}" >> "$GITHUB_OUTPUT"

      - name: Generate AI-Enhanced Release Notes with Gemini
        id: ai_release_notes
        uses: 'google-github-actions/run-gemini-cli@v0'
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          COMMIT_RANGE: ${{ steps.get_prev_tag.outputs.tag }}..v${{ steps.resolve_version.outputs.version }}
          CLEAN_CHANGELOG: ${{ steps.changelog.outputs.clean_changelog }}
          RELEASE_NOTES_FILE: 'RELEASE_NOTES.md'
          GEMINI_CLI_TRUST_WORKSPACE: true
        with:
          gemini_api_key: '${{ secrets.GEMINI_API_KEY }}'
          gemini_model: ${{ github.event.inputs.gemini_model != '' && github.event.inputs.gemini_model || vars.GEMINI_MODEL }}
          workflow_name: 'gemini-release-notes'
          settings: |-
            {
              "sandbox": true,
              "autoAccept": true,
              "model": {
                "maxSessionTurns": 25
              },
              "mcpServers": {
                "github": {
                  "command": "docker",
                  "args": [
                    "run",
                    "-i",
                    "--rm",
                    "-e",
                    "GITHUB_PERSONAL_ACCESS_TOKEN",
                    "ghcr.io/github/github-mcp-server:v0.27.0"
                  ],
                  "env": {
                    "GITHUB_PERSONAL_ACCESS_TOKEN": "${GITHUB_TOKEN}"
                  }
                }
              }
            }
          prompt: '/gemini-release-notes'

      - name: Read Release Notes
        id: read_release_notes
        run: |
          if [ -f RELEASE_NOTES.md ]; then
            NOTES="$(cat RELEASE_NOTES.md)"
          else
            NOTES="No release notes generated."
          fi
          delimiter="__RELEASE_NOTES_EOF__"
          echo "notes<<$delimiter" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "$delimiter" >> "$GITHUB_OUTPUT"

      - name: Create Release Tag with AI-Enhanced Notes
        uses: ncipollo/release-action@v1
        with:
          commit: main
          body: ${{ steps.read_release_notes.outputs.notes }}
          tag: v${{ steps.resolve_version.outputs.version }}
          name: v${{ steps.resolve_version.outputs.version }}
          draft: false
          prerelease: false
          token: ${{ secrets.RELEASE_TOKEN }}
