version: "3.8"
services:
  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
  mongodb:
    image: mongo
    container_name: mongo
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - data:/data
    environment:
      - MONGO_INITDB_ROOT_USERNAME=mongodb_user
      - MONGO_INITDB_ROOT_PASSWORD=mongodb_pwd
    entrypoint:
      - bash
      - -c
      - |
        openssl rand -base64 756 > /data/replica.key
        chmod 400 /data/replica.key
        chown 999:999 /data/replica.key
        exec docker-entrypoint.sh mongod --replSet rs0 --keyFile /data/replica.key
    healthcheck:
      test: >
        mongosh -u mongodb_user -p mongodb_pwd --eval "
        try { rs.status().ok }
        catch(e) { rs.initiate({_id:'rs0', members:[{_id:0, host:'localhost:27017'}]}).ok }"
      interval: 5s
      start_period: 15s

  mongo-express:
    image: mongo-express
    container_name: mongo-express
    ports:
      - "127.0.0.1:9090:8081"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=mongodb_user
      - ME_CONFIG_MONGODB_ADMINPASSWORD=mongodb_pwd
      - ME_CONFIG_MONGODB_URL=mongodb://mongodb_user:mongodb_pwd@mongo:27017/?directConnection=true&authSource=admin

# Piper server configuration: Make sure to align with production environment settings
  piper:
    build: piper
    container_name: piper-server
    ports:
      - "5001:5000"
    restart: unless-stopped
    profiles:
      - tts


volumes:
  data: {}

networks:
  default:
    name: mongodb_network
